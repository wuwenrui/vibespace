name: Build Test

on:
  push:
    branches: [main]
    paths:
      - 'build-test/**'
      - '.github/workflows/build-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'build-test/**'
      - '.github/workflows/build-test.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: diy-vibe-space

jobs:
  build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile
        run: docker run --rm -i hadolint/hadolint < build-test/Dockerfile || true

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: build-test
          file: build-test/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:aio
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify entrypoint exists
        run: docker run --rm --entrypoint "" ${{ env.IMAGE_NAME }}:aio test -x /usr/local/bin/entrypoint.sh

      - name: Verify installed tools
        run: |
          docker run --rm --entrypoint "" ${{ env.IMAGE_NAME }}:aio bash -c '
            echo "=== Go ===" && go version &&
            echo "=== Node ===" && node --version &&
            echo "=== npm ===" && npm --version &&
            echo "=== Python ===" && python3 --version &&
            echo "=== TypeScript ===" && tsc --version &&
            echo "=== Rust ===" && rustc --version &&
            echo "=== Java ===" && java --version &&
            echo "=== code-server ===" && code-server --version &&
            echo "=== Claude Code ===" && claude --version &&
            echo "=== Git ===" && git --version &&
            echo "All tools verified!"
          '

      - name: Verify exposed ports
        run: |
          PORTS=$(docker inspect --format='{{json .Config.ExposedPorts}}' ${{ env.IMAGE_NAME }}:aio)
          echo "Exposed ports: $PORTS"
          echo "$PORTS" | grep -q "8080/tcp" && echo "Port 8080: OK"
          echo "$PORTS" | grep -q "22/tcp" && echo "Port 22: OK"

      - name: Verify docker-compose config
        run: docker compose -f build-test/docker-compose.yml config --quiet

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          GHCR_TAG=ghcr.io/${{ steps.lower.outputs.owner }}/${{ env.IMAGE_NAME }}:aio
          docker tag ${{ env.IMAGE_NAME }}:aio "$GHCR_TAG"
          docker push "$GHCR_TAG"
          echo "Pushed: $GHCR_TAG"
